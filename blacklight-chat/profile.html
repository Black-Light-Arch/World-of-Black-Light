<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | World of BlackLight</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<canvas id="particles"></canvas>

<header class="navbar">
    <div class="nav-logo">BlackLight</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="games.html">Games</a>
        <a href="stories.html">Stories</a>
        <a href="devlog.html">DevLog</a>
        <a href="about.html">About</a>
        <div id="nav-auth"></div>
    </nav>
</header>

<section class="profile-section">

    <div class="profile-card reveal">

        <!-- Current Avatar -->
        <div class="profile-avatar-display">
            <div class="avatar-circle" id="avatarDisplay">👁️</div>
            <div class="avatar-glow"></div>
        </div>

        <div class="profile-info">
            <h1 id="profileName">—</h1>
            <p id="profileEmail" class="profile-email">—</p>
            <span class="profile-badge">BlackLight Member</span>
        </div>

        <div class="profile-divider"></div>

        <!-- Emoji Picker -->
        <div class="profile-section-title">Choose Profile Icon</div>
        <div class="emoji-grid profile-emoji-grid" id="profileEmojiGrid">
            <button type="button" class="emoji-option" data-emoji="👁️">👁️</button>
            <button type="button" class="emoji-option" data-emoji="💀">💀</button>
            <button type="button" class="emoji-option" data-emoji="🌑">🌑</button>
            <button type="button" class="emoji-option" data-emoji="👤">👤</button>
            <button type="button" class="emoji-option" data-emoji="🎮">🎮</button>
            <button type="button" class="emoji-option" data-emoji="🔮">🔮</button>
            <button type="button" class="emoji-option" data-emoji="☠️">☠️</button>
            <button type="button" class="emoji-option" data-emoji="🐺">🐺</button>
            <button type="button" class="emoji-option" data-emoji="🕷️">🕷️</button>
            <button type="button" class="emoji-option" data-emoji="🧿">🧿</button>
            <button type="button" class="emoji-option" data-emoji="🌿">🌿</button>
            <button type="button" class="emoji-option" data-emoji="🔥">🔥</button>
        </div>

        <button class="save-emoji-btn" id="saveEmojiBtn">Save Icon</button>
        <p class="save-confirm" id="saveConfirm"></p>

        <div class="profile-divider"></div>

        <!-- Stats -->
        <div class="profile-stats">
            <div class="stat-block">
                <span class="stat-number">3</span>
                <span class="stat-label">Stories Read</span>
            </div>
            <div class="stat-block">
                <span class="stat-number">3</span>
                <span class="stat-label">Dev Logs</span>
            </div>
            <div class="stat-block">
                <span class="stat-number">1</span>
                <span class="stat-label">Games</span>
            </div>
        </div>

        <div class="profile-divider"></div>

        <button class="logout-profile-btn" id="profileLogout">Leave the Dark</button>

    </div>

</section>

<footer>
    <p>&copy; 2026 World of BlackLight</p>
</footer>

<script src="js/particles.js"></script>
<script src="js/animations.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/profile.js"></script>

<script src="js/chatbot-widget.js"></script>
</body>
</html>
